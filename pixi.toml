[workspace]
name = "regression-pipeline-tuning"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]

# ---------------------------------------------------------------------------
# Python interpreter variants (pick one per environment).
# ---------------------------------------------------------------------------
[feature.gil.dependencies]
python = ">=3.11,<3.14"
ipython = "*"

[feature.freethreading.dependencies]
python-freethreading = ">=3.14,<3.15"
ipython = "*"

# ---------------------------------------------------------------------------
# PyPI-only environment: scientific stack from PyPI.
# ---------------------------------------------------------------------------
[feature.pypi-deps.pypi-dependencies]
joblib = "*"
numpy = "*"
pandas = "*"
scikit-learn = ">=1.8"

[feature.pypi-gil.tasks]
pypi-gil-threading = "python regression_pipeline_tuning.py --joblib-backend threading"
pypi-gil-loky = "python regression_pipeline_tuning.py --joblib-backend loky"

[feature.pypi-ft.tasks]
pypi-freethreading-threading = "python regression_pipeline_tuning.py --joblib-backend threading"
pypi-freethreading-loky = "python regression_pipeline_tuning.py --joblib-backend loky"

# ---------------------------------------------------------------------------
# conda-forge environments with selectable BLAS/LAPACK implementations.
# ---------------------------------------------------------------------------
[feature.openblas-pthreads-deps.dependencies]
libopenblas = { version = "*", build = "*pthreads*" }
numpy = "*"
scipy = "*"
scikit-learn = "*"
joblib = "*"
pandas = "*"

[feature.openblas-pthreads-gil.tasks]
openblas-pthreads-gil-threading = "python regression_pipeline_tuning.py --joblib-backend threading"
openblas-pthreads-gil-loky = "python regression_pipeline_tuning.py --joblib-backend loky"

[feature.openblas-pthreads-ft.tasks]
openblas-pthreads-freethreading-threading = "python regression_pipeline_tuning.py --joblib-backend threading"
openblas-pthreads-freethreading-loky = "python regression_pipeline_tuning.py --joblib-backend loky"

[feature.openblas-openmp-deps.dependencies]
libopenblas = { version = "*", build = "*openmp*" }
numpy = "*"
scipy = "*"
scikit-learn = "*"
joblib = "*"
pandas = "*"

[feature.openblas-openmp-gil.tasks]
openblas-openmp-gil-threading = "python regression_pipeline_tuning.py --joblib-backend threading"
openblas-openmp-gil-loky = "python regression_pipeline_tuning.py --joblib-backend loky"

[feature.openblas-openmp-ft.tasks]
openblas-openmp-freethreading-threading = "python regression_pipeline_tuning.py --joblib-backend threading"
openblas-openmp-freethreading-loky = "python regression_pipeline_tuning.py --joblib-backend loky"

[feature.newaccelerate-deps]
platforms = ["osx-64", "osx-arm64"]

[feature.newaccelerate-deps.system-requirements]
macos = "13.3"

[feature.newaccelerate-deps.dependencies]
libblas = { version = "*", build = "*newaccelerate*" }
liblapack = { version = "*", build = "*newaccelerate*" }
numpy = "*"
scipy = "*"
scikit-learn = "*"
joblib = "*"
pandas = "*"

[feature.newaccelerate-gil.tasks]
newaccelerate-gil-threading = "python regression_pipeline_tuning.py --joblib-backend threading"
newaccelerate-gil-loky = "python regression_pipeline_tuning.py --joblib-backend loky"

[feature.newaccelerate-ft.tasks]
newaccelerate-freethreading-threading = "python regression_pipeline_tuning.py --joblib-backend threading"
newaccelerate-freethreading-loky = "python regression_pipeline_tuning.py --joblib-backend loky"

[feature.mkl-deps]
platforms = ["linux-64", "osx-64", "win-64"]

[feature.mkl-deps.dependencies]
libblas = { version = "*", build = "*mkl*" }
liblapack = { version = "*", build = "*mkl*" }
mkl = "*"
numpy = "*"
scipy = "*"
scikit-learn = "*"
joblib = "*"
pandas = "*"

[feature.mkl-gil.target.linux-64.tasks]
mkl-gil-threading = "python regression_pipeline_tuning.py --joblib-backend threading"
mkl-gil-loky = "python regression_pipeline_tuning.py --joblib-backend loky"

[feature.mkl-gil.target.osx-64.tasks]
mkl-gil-threading = "python regression_pipeline_tuning.py --joblib-backend threading"
mkl-gil-loky = "python regression_pipeline_tuning.py --joblib-backend loky"

[feature.mkl-gil.target.win-64.tasks]
mkl-gil-threading = "python regression_pipeline_tuning.py --joblib-backend threading"
mkl-gil-loky = "python regression_pipeline_tuning.py --joblib-backend loky"

[feature.mkl-ft.target.linux-64.tasks]
mkl-freethreading-threading = "python regression_pipeline_tuning.py --joblib-backend threading"
mkl-freethreading-loky = "python regression_pipeline_tuning.py --joblib-backend loky"

[feature.mkl-ft.target.osx-64.tasks]
mkl-freethreading-threading = "python regression_pipeline_tuning.py --joblib-backend threading"
mkl-freethreading-loky = "python regression_pipeline_tuning.py --joblib-backend loky"

[feature.mkl-ft.target.win-64.tasks]
mkl-freethreading-threading = "python regression_pipeline_tuning.py --joblib-backend threading"
mkl-freethreading-loky = "python regression_pipeline_tuning.py --joblib-backend loky"

[environments]
pypi-gil = { features = ["pypi-deps", "gil", "pypi-gil"], no-default-feature = true, solve-group = "pypi-gil" }
pypi-freethreading = { features = ["pypi-deps", "freethreading", "pypi-ft"], no-default-feature = true }

openblas-pthreads-gil = { features = ["openblas-pthreads-deps", "gil", "openblas-pthreads-gil"], no-default-feature = true, solve-group = "openblas-pthreads-gil" }
openblas-pthreads-freethreading = { features = ["openblas-pthreads-deps", "freethreading", "openblas-pthreads-ft"], no-default-feature = true }

openblas-openmp-gil = { features = ["openblas-openmp-deps", "gil", "openblas-openmp-gil"], no-default-feature = true, solve-group = "openblas-openmp-gil" }
openblas-openmp-freethreading = { features = ["openblas-openmp-deps", "freethreading", "openblas-openmp-ft"], no-default-feature = true }

newaccelerate-gil = { features = ["newaccelerate-deps", "gil", "newaccelerate-gil"], no-default-feature = true, solve-group = "newaccelerate-gil" }
newaccelerate-freethreading = { features = ["newaccelerate-deps", "freethreading", "newaccelerate-ft"], no-default-feature = true }

mkl-gil = { features = ["mkl-deps", "gil", "mkl-gil"], no-default-feature = true, solve-group = "mkl-gil" }
mkl-freethreading = { features = ["mkl-deps", "freethreading", "mkl-ft"], no-default-feature = true }

# ---------------------------------------------------------------------------
# Run all benchmark tasks that are compatible with the host platform.
# ---------------------------------------------------------------------------
[tasks]
run-all-common = { depends-on = [
  "pypi-gil-threading",
  "pypi-gil-loky",
  "pypi-freethreading-threading",
  "pypi-freethreading-loky",
  "openblas-pthreads-gil-threading",
  "openblas-pthreads-gil-loky",
  "openblas-pthreads-freethreading-threading",
  "openblas-pthreads-freethreading-loky",
  "openblas-openmp-gil-threading",
  "openblas-openmp-gil-loky",
  "openblas-openmp-freethreading-threading",
  "openblas-openmp-freethreading-loky",
] }

run-all-newaccelerate = { depends-on = [
  "newaccelerate-gil-threading",
  "newaccelerate-gil-loky",
  "newaccelerate-freethreading-threading",
  "newaccelerate-freethreading-loky",
] }

run-all-mkl = { depends-on = [
  "mkl-gil-threading",
  "mkl-gil-loky",
  "mkl-freethreading-threading",
  "mkl-freethreading-loky",
] }

run-all = { depends-on = ["run-all-common"] }

[target.osx-64.tasks]
run-all = { depends-on = ["run-all-common", "run-all-newaccelerate", "run-all-mkl"] }

[target.osx-arm64.tasks]
run-all = { depends-on = ["run-all-common", "run-all-newaccelerate"] }

[target.linux-64.tasks]
run-all = { depends-on = ["run-all-common", "run-all-mkl"] }

[target.win-64.tasks]
run-all = { depends-on = ["run-all-common", "run-all-mkl"] }

